<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master | Register</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
}

/* HEADER */
header{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background: rgba(255,255,255,0.05);
}
header .logo{
    font-size:24px;
    font-weight:bold;
}
header nav a{
    margin-left:20px;
    color:white;
    text-decoration:none;
}
header nav a:hover{
    text-decoration:underline;
}

/* FORM CARD */
.form-container{
    width:90%;
    max-width:450px;
    background:white;
    color:#111;
    margin:80px auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.form-container h2{
    text-align:center;
    color:#4f46e5;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#4338ca;
}

.message{
    text-align:center;
    margin-top:10px;
    color:green;
}

footer{
    margin-top:auto;
    padding:30px;
    color:white;
}
</style>
</head>
<body>

<header>
    <div class="logo">🎯 Quiz Master</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="quiz.html">Play Quiz</a>
    </nav>
</header>

<div class="form-container">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="registerUser()">Create Account</button>

    <p class="message" id="msg"></p>
</div>

<footer>
    <p>© 2026 Quiz Master. All rights reserved.</p>
</footer>

<script>
function registerUser(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!name || !email || !password){
        document.getElementById("msg").innerText = "⚠ Please fill all fields!";
        document.getElementById("msg").style.color = "red";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.push({
        name:name,
        email:email,
        password:password
    });

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("msg").innerText = "✅ Registration Successful!";
    document.getElementById("msg").style.color = "green";

    setTimeout(()=>{
        window.location.href = "login.html";
    },1500);
}
</script>

</body>
</html>
